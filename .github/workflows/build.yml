name: Build FPL Dashboard

on:
  # Manual trigger from the Actions tab
  workflow_dispatch:

  # Rebuild on every push to main (handy when you tweak the script)
  push:
    branches: [main]

  # Auto-rebuild on a schedule. Cron is in UTC.
  # Tuesday 08:00 UTC = morning after weekend gameweeks finish.
  # Friday 22:00 UTC = after Friday-night fixtures.
  # Sunday 22:00 UTC = after Sunday fixtures.
  schedule:
    - cron: "0 8 * * 2"
    - cron: "0 22 * * 5"
    - cron: "0 22 * * 0"

# Allow the workflow to write to the repo (to commit the rebuilt index.html)
# and to deploy to Pages.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard
        run: python build.py --league-id 2007916 --output index.html

      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh dashboard ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
